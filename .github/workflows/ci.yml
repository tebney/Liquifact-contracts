name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -p liquifact_escrow -- --check

      - name: Clippy 
        run: cargo clippy -p liquifact_escrow -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

       - name: Add WASM target
       run: rustup target add wasm32-unknown-unknown
      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release -p liquifact_escrow

      - name: Workspace Clippy (all targets)
        run: cargo clippy -p liquifact_escrow --all-targets -- -D warnings

      - name: Check coverage (≥ 95%)
        run: |
          cargo llvm-cov \
            --features testutils \
            --fail-under-lines 95 \
            --summary-only \
            -p liquifact_escrow
